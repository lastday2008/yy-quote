<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>用友银企联 · 智能报价</title>
    <!-- CDN Libraries -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Fonts -->
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="./shared/common.css">
</head>
<body>
    <div class="content-scroll">
        <!-- 智能报价模块 - 子页面 -->
<style>
/* ===== 智能报价模块样式 ===== */
.quote-module { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
.quote-module .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; border: 1px solid #e2e8f0; }
.quote-module .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
.quote-module .card-title { font-size: 1.1rem; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; }

.quote-module .form-group { display: flex; flex-direction: column; gap: 6px; }
.quote-module .form-label { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.quote-module .form-input,
.quote-module .form-select { padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; font-family: inherit; transition: all 0.2s; background: white; }
.quote-module .form-input:focus,
.quote-module .form-select:focus { outline: none; border-color: #2a5298; box-shadow: 0 0 0 3px rgba(42,82,152,0.1); }

/* radio-group */
.quote-module .radio-group { display: flex; gap: 10px; }
.quote-module .radio-card { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; background: white; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
.quote-module .radio-card.active { border-color: #1e3c72; background: #eff6ff; color: #1e3c72; font-weight: 600; }
.quote-module .radio-card input[type="radio"] { display: none; }

/* 产品区域分组 */
.quote-module .product-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; margin-top: 4px; }
.quote-module .product-section-title { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* product-grid */
.quote-module .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quote-module .product-checkbox { position: relative; padding: 10px 8px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; background: white; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; min-height: 44px; }
.quote-module .product-checkbox:hover { border-color: #2a5298; box-shadow: 0 2px 8px rgba(42,82,152,0.08); }
.quote-module .product-checkbox.selected { border-color: #1e3c72; background: #eff6ff; color: #1e3c72; font-weight: 600; box-shadow: 0 2px 8px rgba(30,60,114,0.12); }
.quote-module .product-checkbox .check-icon { display: none; position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: #1e3c72; color: white; border-radius: 50%; font-size: 11px; line-height: 18px; text-align: center; }
.quote-module .product-checkbox.selected .check-icon { display: block; }
.quote-module .product-checkbox .finance-tag { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #8b5cf6; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.quote-module .product-checkbox.disabled { opacity: 0.35; cursor: not-allowed; border-color: #e2e8f0; background: #f1f5f9; color: #94a3b8; }
.quote-module .product-checkbox.disabled:hover { border-color: #e2e8f0; }
.quote-module .product-checkbox.disabled .check-icon { display: none !important; }
.quote-module .product-checkbox.disabled input[type="checkbox"] { display: none; }

/* 紧凑radio */
.quote-module .simple-radio-group { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.quote-module .simple-radio-group > span { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.quote-module .simple-radio-group label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; cursor: pointer; user-select: none; }
.quote-module .simple-radio-group input[type="radio"] { width: 16px; height: 16px; cursor: pointer; margin: 0; }

/* 必选模块 */
.quote-module .required-box-compact { padding: 8px 10px; background: #fffbeb; border: 2px solid #f59e0b; border-radius: 8px; margin-top: 8px; }
.quote-module .required-box-compact .required-title { font-weight: 700; color: #92400e; margin-bottom: 4px; font-size: 0.75rem; }
.quote-module .required-box-compact .required-list { display: flex; flex-wrap: wrap; gap: 4px; }
.quote-module .required-box-compact .required-tag { background: white; color: #92400e; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; border: 1px solid #f59e0b; }

/* data-table */
.quote-module .data-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9rem; }
.quote-module .data-table th { background: #f1f5f9; padding: 12px 16px; text-align: left; font-weight: 600; color: #64748b; border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
.quote-module .data-table td { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; }
.quote-module .data-table tr:hover { background: #f8fafc; }

/* summary-grid */
.quote-module .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.quote-module .summary-card { background: white; padding: 20px; border-radius: 12px; border-left: 4px solid #1e3c72; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
.quote-module .summary-card.warning { border-left-color: #f59e0b; }
.quote-module .summary-label { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; }
.quote-module .summary-value { font-size: 1.8rem; font-weight: 700; color: #1e293b; }

/* collapse */
.quote-module .collapsed { display: none !important; }
.quote-module .collapse-btn { padding: 4px 10px; font-size: 0.75rem; background: white; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; color: #64748b; }
.quote-module .collapse-btn:hover { background: #f1f5f9; color: #1e293b; }

/* status-badge */
.quote-module .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

/* 产品数量输入框 */
.product-qty-input {
    width: 48px; padding: 3px 4px; border: 1px solid #cbd5e1; border-radius: 6px;
    text-align: center; font-size: 0.78rem; font-weight: 600; color: #1e293b;
    background: white; transition: all 0.2s;
}
.product-qty-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
.product-qty-input:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }

/* 按钮 */
.quote-module .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
.quote-module .btn-primary { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; box-shadow: 0 4px 12px rgba(30,60,114,0.3); }
.quote-module .btn-secondary { background: white; color: #1e293b; border: 1px solid #e2e8f0; }
</style>

<div class="quote-module">
    <div style="display: grid; grid-template-columns: 380px 1fr; gap: 24px;">
        <!-- 左列：报价参数 -->
        <div class="card" style="position: sticky; top: 24px; height: fit-content;">
            <div class="card-header"><div class="card-title">&#x2699;&#xFE0F; 报价参数</div></div>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div class="form-group">
                    <label class="form-label">银企联订阅模式</label>
                    <div class="radio-group">
                        <label class="radio-card active" id="radioPublic" onclick="quoteModule.setDeployMode('public')"><input type="radio" name="deployMode" value="public" checked><div>&#x2601;&#xFE0F; 公有云订阅</div></label>
                        <label class="radio-card" id="radioLocal" onclick="quoteModule.setDeployMode('local')"><input type="radio" name="deployMode" value="local"><div>&#x1F3E2; 本地部署订阅</div></label>
                    </div>
                    <div id="restrictedNotice" style="display: none; margin-top: 12px; padding: 12px; background: #fffbeb; border-left: 4px solid #f59e0b; border-radius: 8px; font-size: 0.85rem; color: #92400e;">
                        <strong>&#x26A0;&#xFE0F; 限制性销售：</strong>需审批后方可销售
                    </div>
                </div>
                <div class="form-group" id="financeVersionGroup">
                    <div style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fafafa; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; width: fit-content;" id="financeRow" onclick="quoteModule.toggleFinanceVersion()">
                        <input type="checkbox" id="financeCheck" style="width: 16px; height: 16px; cursor: pointer; margin: 0;" onchange="event.preventDefault(); quoteModule.toggleFinanceVersion();">
                        <span style="font-weight: 600; font-size: 0.85rem;">启用财资财司版</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">业务系统</label>
                    <select id="businessSystem" class="form-select" onchange="quoteModule.handleSystemChange()">
                        <option value="YonBIP旗舰版" selected>YonBIP旗舰版</option>
                        <option value="YonBIP超级版">YonBIP超级版</option>
                        <option value="YonBIP高级版">YonBIP高级版</option>
                        <option value="NC">NC</option>
                        <option value="NCC">NCC</option>
                        <option value="YonSuite">YonSuite</option>
                        <option value="U8">U8</option>
                        <option value="U9">U9</option>
                        <option value="U9 Cloud">U9 Cloud</option>
                        <option value="U8 Cloud">U8 Cloud</option>
                    </select>
                </div>
                <div class="form-group" id="cloudModeGroup">
                    <div class="simple-radio-group">
                        <span>部署方式</span>
                        <div style="display: flex; gap: 16px;">
                            <label id="cloudPublicLabel">
                                <input type="radio" name="cloudMode" value="public" id="cloudPublic" checked oninput="validateBankCount(this)">
                                <span>公有云部署</span>
                            </label>
                            <label id="cloudPrivateLabel">
                                <input type="radio" name="cloudMode" value="private" id="cloudPrivate" oninput="validateBankCount(this)">
                                <span>本地部署</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="required-box-compact" id="requiredModulesBox">
                    <div class="required-title">&#x1F4CB; 必选模块</div>
                    <div class="required-list" id="requiredModulesList"></div>
                </div>
                <div class="form-group" id="operatorGroup">
                    <label class="form-label">操作员个数</label>
                    <input type="number" id="operatorCount" class="form-input" value="1" min="1" max="100" oninput="validateBankCount(this)">
                </div>
                <div class="form-group" id="ukeyGroup">
                    <label class="form-label">银行UKey</label>
                    <div class="radio-group">
                        <label class="radio-card active" id="ukeyHosted" onclick="quoteModule.setUKeyMode('hosted')"><input type="radio" name="ukeyMode" value="hosted" id="hosted" checked><div>&#x2601;&#xFE0F; 托管</div></label>
                        <label class="radio-card" id="ukeySelf" onclick="quoteModule.setUKeyMode('self')"><input type="radio" name="ukeyMode" value="self" id="self"><div>&#x1F3E2; 自持</div></label>
                    </div>
                </div>
                <div class="product-section">
                    <div class="simple-radio-group" style="flex-direction: column; align-items: flex-start; gap: 6px; margin-bottom: 10px;">
                        <span>报价维度</span>
                        <div style="display: flex; gap: 20px; align-items: center;">
                            <label style="display: flex; align-items: center; gap: 5px; font-size: 0.85rem;">
                                <input type="radio" name="quoteMode" value="bank" id="quoteModeBank" checked onchange="quoteModule.setQuoteMode('bank')">
                                <span id="countLabel">银行个数</span>
                                <input type="number" id="bankCount" class="form-input" value="1" min="1" max="100" onchange="quoteModule.updateQuote()" onclick="event.stopPropagation()" style="width: 90px; padding: 3px 10px; font-size: 0.8rem; margin-left: 2px;">
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; font-size: 0.85rem;">
                                <input type="radio" name="quoteMode" value="product" id="quoteModeProduct" onchange="quoteModule.setQuoteMode('product')">
                                <span>产品个数</span>
                            </label>
                        </div>
                    </div>
                    <div class="product-grid" id="productsGrid">
                        <div class="product-checkbox selected" onclick="quoteModule.toggleProduct('kuaijiesuan')" id="box_kuaijiesuan"><input type="checkbox" id="kuaijiesuan" checked style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">快结算</span><input type="number" class="product-qty-input" id="qty_kuaijiesuan" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                        <div class="product-checkbox selected" onclick="quoteModule.toggleProduct('yinzhangtong')" id="box_yinzhangtong"><input type="checkbox" id="yinzhangtong" checked style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">银账通</span><input type="number" class="product-qty-input" id="qty_yinzhangtong" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                        <div class="product-checkbox" onclick="quoteModule.toggleProduct('dianpiaotong')" id="box_dianpiaotong"><input type="checkbox" id="dianpiaotong" style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">电票通</span><input type="number" class="product-qty-input" id="qty_dianpiaotong" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                        <div class="product-checkbox" onclick="quoteModule.toggleProduct('shoukuan')" id="box_shoukuan"><input type="checkbox" id="shoukuan" style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">收款通</span><input type="number" class="product-qty-input" id="qty_shoukuan" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                        <div class="product-checkbox disabled" onclick="quoteModule.toggleProduct('rongzi')" id="box_rongzi"><input type="checkbox" id="rongzi" style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">融资通</span><input type="number" class="product-qty-input" id="qty_rongzi" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                        <div class="product-checkbox disabled" onclick="quoteModule.toggleProduct('touzi')" id="box_touzi"><input type="checkbox" id="touzi" style="display: none;"><span class="check-icon">&#x2713;</span><div style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;"><span style="font-weight: 600;">投资通</span><input type="number" class="product-qty-input" id="qty_touzi" value="1" min="1" max="999" oninput="validateQtyInput(this)" onclick="event.stopPropagation()" style="display:none;"></div></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">订阅年限</label>
                    <select id="yearCount" class="form-select" oninput="validateBankCount(this)">
                        <option value="1" selected>1年</option><option value="2">2年</option><option value="3">3年</option><option value="5">5年</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">折扣率 (%)</label>
                    <input type="number" id="discountRate" class="form-input" value="100" min="1" max="100" oninput="validateDiscount(this)">
                    <div id="discountDisplay" style="margin-top: 6px; padding: 8px; background: #eff6ff; border-radius: 6px; color: #1e3c72; font-size: 0.85rem; font-weight: 600; text-align: center;">无折扣</div>
                </div>
                <!-- 独立页面操作按钮 -->
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 8px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
                    <button class="btn btn-primary" onclick="exportQuote()" style="width: 100%; justify-content: center;">📄 导出Word</button>
                    <button class="btn btn-primary" onclick="generateOpportunitySummary()" style="width: 100%; justify-content: center;">📋 生成商机摘要</button>
                    <button class="btn btn-secondary" onclick="resetQuote()" style="width: 100%; justify-content: center;">🔄 重置</button>
                </div>
            </div>
        </div>

        <!-- 右列：价格参考表 + 报价明细 -->
        <div>
            <!-- 价格参考表 -->
            <div class="card" style="padding: 16px;">
                <div class="card-header" style="margin-bottom: 12px; padding-bottom: 12px;">
                    <div class="card-title" id="priceTableTitle" style="font-size: 1rem;">&#x1F4CA; 价格参考表（公有云订阅-标准版）</div>
                    <button onclick="quoteModule.toggleCollapse('priceTableWrap')" class="collapse-btn" type="button">折叠/展开</button>
                </div>
                <div id="priceTableWrap" class="collapsed" style="overflow-x: auto;">
                    <table class="data-table" id="refTable" style="font-size: 0.8rem;">
                        <thead><tr><th style="padding: 8px 12px;">业务系统</th><th style="padding: 8px 12px;">快结算</th><th style="padding: 8px 12px;">银账通</th><th style="padding: 8px 12px;">电票通</th><th style="padding: 8px 12px;">收款通</th></tr></thead>
                        <tbody id="refTableBody" style="font-size: 0.8rem;"></tbody>
                    </table>
                </div>
            </div>

            <!-- 报价明细 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">&#x1F4DD; 报价明细</div>
                    <span id="selectedBadge" class="status-badge" style="background: #1e3c72; color: white;">已选 2 项</span>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table" id="quoteTable">
                        <thead><tr><th>序号</th><th>产品名称</th><th>单价</th><th>数量</th><th>小计</th><th>商务模式</th></tr></thead>
                        <tbody id="quoteTableBody"></tbody>
                    </table>
                </div>
                <div class="summary-grid">
                    <div class="summary-card warning"><div class="summary-label">一次性采购（硬件）</div><div class="summary-value" id="oneTimeTotal">&yen;0</div></div>
                    <div class="summary-card" id="subscriptionCard"><div class="summary-label">订阅费用</div><div class="summary-value" id="subscriptionTotal">&yen;0</div><div style="font-size: 0.85rem; color: #64748b; margin-top: 4px;" id="subscriptionDetail">1年 | 年费&yen;0</div></div>
                </div>
                <div style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 24px; border-radius: 12px; text-align: center; margin-top: 20px;">
                    <div style="font-size: 0.9rem; opacity: 0.9; margin-bottom: 8px;">合计费用</div>
                    <div style="font-size: 2rem; font-weight: 700;" id="grandTotal">&yen;0</div>
                </div>
                <div style="margin-top: 20px; padding: 16px; background: #fffbeb; border-left: 4px solid #f59e0b; border-radius: 8px; font-size: 0.85rem; color: #92400e;" id="noticeContent">
                    1. 本报价仅供参考，最终价格以商务合同为准<br>2. 标准版计量单位：银行数/年数<br>3. 投资通、融资通仅限BIP旗舰版、超级版
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== 配置数据 =====
    const systemConfig = {
        'YonBIP旗舰版': { priceCode: 'YB', cloudTypes: ['public','private'], defaultCloud: 'public', requiredModules: ['资金结算','全球账户'], eSignRule: 'conditional', needUKey: true, allowInvest: true },
        'YonBIP超级版': { priceCode: 'YB', cloudTypes: ['public','private'], defaultCloud: 'public', requiredModules: ['资金结算','全球账户'], eSignRule: 'conditional', needUKey: true, allowInvest: true },
        'YonBIP高级版': { priceCode: 'NC', cloudTypes: ['private'], defaultCloud: 'private', requiredModules: ['现金管理','银企直连','结算平台','CA'], eSignRule: 'always', needUKey: false, allowInvest: false },
        'NC': { priceCode: 'NC', cloudTypes: ['private'], defaultCloud: 'private', requiredModules: ['现金管理','银企直连','CA'], eSignRule: 'always', needUKey: false, allowInvest: false },
        'NCC': { priceCode: 'NC', cloudTypes: ['private'], defaultCloud: 'private', requiredModules: ['现金管理','银企直连','CA'], eSignRule: 'always', needUKey: false, allowInvest: false },

    function getRequiredModules() {
        const system = document.getElementById('businessSystem').value;
        const productMap = requiredModulesMap[system];
        if (!productMap) return [];
        const selectedProducts = [];
        if (document.getElementById('kuaijiesuan').checked) selectedProducts.push('kuaijiesuan');
        if (document.getElementById('yinzhangtong').checked) selectedProducts.push('yinzhangtong');
        if (document.getElementById('dianpiaotong').checked) selectedProducts.push('dianpiaotong');
        const allModules = new Set();
        selectedProducts.forEach(function(product) {
            const modules = productMap[product];
            if (modules && modules.indexOf('不支持') === -1) {
                modules.forEach(function(m) { allModules.add(m); });
            }
        });
        return Array.from(allModules);
    }

    function updateRequiredModulesDisplay() {
        const modules = getRequiredModules();
        const box = document.getElementById('requiredModulesBox');
        const list = document.getElementById('requiredModulesList');
        if (!box || !list) return;
        if (modules.length === 0) {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            list.innerHTML = modules.map(function(m) { return '<span class="required-tag">' + m + '</span>'; }).join('');
        }
    }

    function calculateTieredPrice(tierPrices, totalCount) {
        let total = 0, remaining = totalCount;
        const tier1Count = Math.min(remaining, 5); total += tier1Count * tierPrices[0]; remaining -= tier1Count;
        if (remaining > 0) { const tier2Count = Math.min(remaining, 10); total += tier2Count * tierPrices[1]; remaining -= tier2Count; }
        if (remaining > 0) total += remaining * tierPrices[2];
        return total;
    }

    function getTierDistribution(totalCount) {
        let tier1 = Math.min(totalCount, 5), remaining = totalCount - tier1;
        let tier2 = Math.min(remaining, 10), tier3 = Math.max(0, remaining - tier2);
        let parts = [];
        if (tier1 > 0) parts.push(tier1 + '家x第一档');
        if (tier2 > 0) parts.push(tier2 + '家x第二档');
        if (tier3 > 0) parts.push(tier3 + '家x第三档');
        return parts.join(' + ');
    }

    function updateQuote() {
        const code = currentConfig.priceCode;

        const config = priceConfig[code];

        const operatorCount = parseInt(document.getElementById('operatorCount').value) || 0;
        const yearCount = parseInt(document.getElementById('yearCount').value) || 1;
        const discountRate = parseInt(document.getElementById('discountRate').value) || 100;
        document.getElementById('discountDisplay').textContent = discountRate === 100 ? '无折扣' : discountRate + '% (' + (discountRate/10).toFixed(1) + '折)';

        // 更新价格参考表
        let refHtml = '';
        for (const key in priceConfig) {
            if (!priceConfig.hasOwnProperty(key)) continue;
            const cfg = priceConfig[key];
            const isCurrent = key === code;
            let kuaiHtml, yinHtml, dianHtml;
            if (isFinance) {
                if (key === 'YS') {
                    kuaiHtml = '集中结算及银账管理<br>¥' + cfg.finance.kuaijiesuan.toLocaleString() + '/系统/年';
                    yinHtml = '-';
                    dianHtml = '-';
                } else {
                    kuaiHtml = '¥' + cfg.finance.kuaijiesuan.toLocaleString() + '/系统/年';
                    yinHtml = '¥' + cfg.finance.yinzhangtong.toLocaleString() + '/系统/年';
                    dianHtml = '¥' + cfg.finance.dianpiaotong.toLocaleString() + '/系统/年';
                }
            } else {
                if (key === 'YB' && Array.isArray(cfg.kuaijiesuan)) {
                    kuaiHtml = '1-5家：' + cfg.kuaijiesuan[0] + '<br>6-15家：' + cfg.kuaijiesuan[1] + '<br>16家+：' + cfg.kuaijiesuan[2];
                    yinHtml = '1-5家：' + cfg.yinzhangtong[0] + '<br>6-15家：' + cfg.yinzhangtong[1] + '<br>16家+：' + cfg.yinzhangtong[2];
                    dianHtml = '1-5家：' + cfg.dianpiaotong[0] + '<br>6-15家：' + cfg.dianpiaotong[1] + '<br>16家+：' + cfg.dianpiaotong[2];
                } else {
                    kuaiHtml = cfg.kuaijiesuan;
                    yinHtml = cfg.yinzhangtong;
                    dianHtml = cfg.dianpiaotong;
                }
            }
            refHtml += '<tr style="' + (isCurrent ? 'background:#eff6ff;font-weight:600;' : '') + '"><td style="font-weight:700;text-align:left;padding-left:12px;">' + cfg.name + '</td><td>' + kuaiHtml + '</td><td>' + yinHtml + '</td><td>' + dianHtml + '</td><td>' + (isFinance ? '-' : cfg.shoukuan) + '</td></tr>';
        }
        document.getElementById('refTableBody').innerHTML = refHtml;

        // 计算报价明细
        let oneTimeTotal = 0, subscriptionTotal = 0, tableHTML = '', rowIndex = 0, selectedProducts = 0;
        let productSubscription = 0; // 提到块外，供年基础费用计算使用
        const isYB = code === 'YB';
        const ukeyModeEl = document.querySelector('input[name="ukeyMode"]:checked');
        const ukeyMode = ukeyModeEl ? ukeyModeEl.value : 'hosted';

        if (isFinance) {
            const system = document.getElementById('businessSystem').value;
            if (system === 'YonSuite') {
                // YonSuite 财资版：只有一个"集中结算及银账管理"
                const checkbox = document.getElementById('kuaijiesuan');
                if (checkbox && checkbox.checked) {
                    selectedProducts++; rowIndex++;
                    const unitPrice = config.finance.kuaijiesuan;
                    const qty = currentQuoteMode === 'product' ? (parseInt(document.getElementById('qty_kuaijiesuan').value) || 0) : count;
                    if (currentQuoteMode === 'product' && qty <= 0) return;
                    const subtotal = unitPrice * qty;
                    productSubscription += subtotal;
                    const qtyLabel = currentQuoteMode === 'product' ? qty + '套' : qty + '系统';
                    tableHTML += '<tr><td>' + rowIndex + '</td><td>集中结算及银账管理</td><td>¥' + unitPrice.toLocaleString() + '</td><td>' + qtyLabel + 'x' + yearCount + '年</td><td style="color:#8b5cf6;font-weight:700;">¥' + (subtotal*yearCount).toLocaleString() + '</td><td>' + (isLocal?'本地部署':'公有云') + '</td></tr>';
                }
            } else {

        window._annualBaseSubscription = productSubscription + (showESign ? CERT_PRICE_PER_YEAR : 0) + (currentConfig.needUKey ? CERT_PRICE_PER_YEAR * operatorCount : 0);

        if (currentQuoteMode === 'bank' && ukeyMode === 'self') {

    function generateOpportunitySummary() {
        try {
            const system = document.getElementById('businessSystem').value;
            const isLocal = currentDeployMode === 'local';
            const deployText = isLocal ? '本地部署' : '公有云';
            const products = [];
            if (document.getElementById('kuaijiesuan').checked) products.push('快结算');
            if (document.getElementById('yinzhangtong').checked) products.push('银账通');
            if (document.getElementById('dianpiaotong').checked) products.push('电票通');
            if (document.getElementById('shoukuan').checked) products.push('收款通');
            if (document.getElementById('rongzi').checked) products.push('融资通');
            if (document.getElementById('touzi').checked) products.push('投资通');
            const count = parseInt(document.getElementById('bankCount').value) || 0;
            const subscription = document.getElementById('subscriptionTotal').textContent;

            let summary;
            if (currentQuoteMode === 'product') {
                summary = system + '（' + deployText + '）+ ' + products.join('、') + '，产品维度报价，预估订阅费用' + subscription;
            } else {
                summary = system + '（' + deployText + '）+ ' + products.join('、') + ' + ' + count + '家，预估订阅费用' + subscription;
            }

            navigator.clipboard.writeText(summary).then(function() {
                showToast('商机摘要已生成并复制到剪贴板');
            }).catch(function(err) {
                console.warn('[Quote] Clipboard API failed:', err);
                const textarea = document.createElement('textarea');
                textarea.value = summary;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('商机摘要已生成并复制到剪贴板');
            });
        } catch (err) {
            console.error('[Quote] generateOpportunitySummary error:', err);
            showToast('生成商机摘要失败：' + err.message);
        }
    }

    function toggleCollapse(elementId) {
        const el = document.getElementById(elementId);
        if (el) el.classList.toggle('collapsed');
    }

    // ===== 初始化 =====
    async function init() {
        try {
            if (typeof initDB === 'function') {
                await initDB();
            }
        } catch (e) {
            console.warn('[Quote] initDB failed:', e);
        }
        handleSystemChange();
        updateQuote();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { init().catch(console.error); });
    } else {
        init();
    }

    // ===== 暴露全局接口（供HTML onclick 和父页面调用） =====
    window.quoteModule = {
        setDeployMode: setDeployMode,
        setQuoteMode: setQuoteMode,
        toggleFinanceVersion: toggleFinanceVersion,
        handleSystemChange: handleSystemChange,
        setUKeyMode: setUKeyMode,
        toggleProduct: toggleProduct,
        updateQuote: updateQuote,
        toggleCollapse: toggleCollapse,
        generateOpportunitySummary: generateOpportunitySummary,
        resetQuote: resetQuote,
        exportQuote: exportQuote
    };

    // ==================== 暴露函数到window供父页面调用 ====================
    window.resetQuote = resetQuote;
    window.generateOpportunitySummary = generateOpportunitySummary;
    window.exportQuote = exportQuote;
    window.setDeployMode = setDeployMode;
    window.toggleFinanceVersion = toggleFinanceVersion;
    window.toggleProduct = toggleProduct;
    window.handleSystemChange = handleSystemChange;
    window.setUKeyMode = setUKeyMode;
    window.updateQuote = updateQuote;
    window.validateQtyInput = validateQtyInput;

})();

    <!-- Shared Scripts from parent (load them in iframe too for standalone use) -->
    <script src="./shared/db.js"></script>
    <script src="./shared/common.js"></script>
    <script>
        // PostMessage handler for commands from parent page
        window.addEventListener('message', function(e) {
            if (e.source !== window.parent) return;
            console.log('[Quote] received message:', e.data);
            if (e.data && e.data.type === 'cmd' && typeof window[e.data.cmd] === 'function') {
                console.log('[Quote] executing cmd:', e.data.cmd);
                window[e.data.cmd]();
            } else if (e.data && e.data.type === 'cmd') {
                console.warn('[Quote] cmd not found or not a function:', e.data.cmd, typeof window[e.data.cmd]);
            }
            if (e.data && e.data.type === 'file' && typeof window.handleParentFile === 'function') {
                window.handleParentFile(e.data.name, e.data.data);
            }
        });

        // Helper to update parent page badges

        window.updateParentBadge = function(id, value) {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'updateBadge', id: id, value: value }, '*');
            }
        };

        // Helper to show data alert on parent
        window.showParentAlert = function(show) {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'showAlert', show: show }, '*');
            }
        };
    </script>
